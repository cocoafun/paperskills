<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Tracker Report</title>
    <style>
      :root {
        --bg: #f6f2e8;
        --panel: #fffdf8;
        --ink: #1f2a2e;
        --muted: #5f6b6d;
        --line: #d9d0c1;
        --accent: #a44a3f;
        --accent-soft: #f0ddd6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #efe3c9 0, transparent 28%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 32px auto 56px;
      }

      header,
      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(73, 56, 34, 0.06);
      }

      section {
        margin-top: 18px;
      }

      h1,
      h2,
      h3 {
        margin: 0 0 12px;
        line-height: 1.1;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.4rem);
      }

      h2 {
        font-size: 1.35rem;
      }

      p,
      li,
      td,
      th {
        font-size: 1rem;
        line-height: 1.6;
      }

      .meta {
        color: var(--muted);
      }

      .pill {
        display: inline-block;
        margin-right: 8px;
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.92rem;
      }

      .paper {
        padding: 16px 0;
        border-top: 1px solid var(--line);
      }

      .paper:first-of-type {
        border-top: 0;
        padding-top: 4px;
      }

      .paper h3 {
        font-size: 1.08rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 10px 8px;
        border-top: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      @media (max-width: 720px) {
        header,
        section {
          padding: 18px;
          border-radius: 16px;
        }

        th,
        td {
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="meta">Paper Tracker Report</p>
        <h1>{{report_title}}</h1>
        <p>{{executive_summary}}</p>
        <div>
          <span class="pill">{{time_window}}</span>
          <span class="pill">{{scope}}</span>
          <span class="pill">{{source_note}}</span>
        </div>
      </header>

      <section>
        <h2>Top Papers</h2>
        {{top_papers_html}}
      </section>

      <section>
        <h2>Trend Summary</h2>
        {{trend_summary_html}}
      </section>

      <section>
        <h2>Full List</h2>
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Venue</th>
              <th>Date</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody>
            {{full_list_rows_html}}
          </tbody>
        </table>
      </section>

      <section>
        <h2>Coverage Notes</h2>
        {{coverage_notes_html}}
      </section>
    </main>
  </body>
</html>
